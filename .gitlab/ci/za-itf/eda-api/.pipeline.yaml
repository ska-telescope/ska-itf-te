.deploy-eda-rest-api:
  tags:
    - ska-k8srunner-za-itf
  stage: deploy-supplementary-services
  image: $DEPLOY_IMAGE
  variables:
    KUBE_APP: eda-rest-api
    K8S_CHART: ska-mid
    KUBE_NAMESPACE: ska-mid-eda-api
    HELM_RELEASE: eda-rest-api
    EDA_API_ENABLERS: "-f .gitlab/ci/za-itf/eda-api/eda-api-enablers.yaml"
    K8S_SKIP_DEP_BUILD: "true"
  when: manual
  script:
    - make vars
    - export K8S_UMBRELLA_CHART_PATH=$(ls -t ./chart.tmp/ska-mid-[0-9]*.tgz | head -n1)
    - sha256sum -c "$K8S_UMBRELLA_CHART_PATH.${CI_PIPELINE_ID}.sha256"
    - echo "Using chart archive - $K8S_UMBRELLA_CHART_PATH"
    - bash .make/resources/gitlab_section.sh install "Install chart" make k8s-install-chart
    - bash .make/resources/gitlab_section.sh wait "Wait for installation" make k8s-wait
  needs:
    - job: helm-chart-build
      artifacts: true
  after_script:
    - rm -rf ./chart.tmp

.redeploy-eda-rest-api:
  extends:
    - .deploy-eda-rest-api
  before_script:
    - !reference [.uninstall-chart, script]
    - kubectl wait --for=delete namespace/$KUBE_NAMESPACE --timeout=60s

.destroy-eda-rest-api:
  extends:
    - .deploy-eda-rest-api
  script:
    - !reference [.uninstall-chart, script]
    - kubectl wait --for=delete namespace/$KUBE_NAMESPACE --timeout=60s

deploy-eda-rest-api:
  extends:
    - .deploy-eda-rest-api

redeploy-eda-rest-api:
  extends:
    - .redeploy-eda-rest-api

destroy-eda-rest-api:
  extends:
    - .destroy-eda-rest-api
